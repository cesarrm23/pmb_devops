<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3FA0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2196F3;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- Gear outer -->
  <g transform="translate(50,50)" fill="none" stroke="#FFFFFF" stroke-width="2.5">
    <circle r="16"/>
    <circle r="7"/>
    <!-- Gear teeth -->
    <line x1="0" y1="-14" x2="0" y2="-20"/>
    <line x1="12.1" y1="-7" x2="17.3" y2="-10"/>
    <line x1="12.1" y1="7" x2="17.3" y2="10"/>
    <line x1="0" y1="14" x2="0" y2="20"/>
    <line x1="-12.1" y1="7" x2="-17.3" y2="10"/>
    <line x1="-12.1" y1="-7" x2="-17.3" y2="-10"/>
  </g>
  <!-- Code brackets -->
  <text x="50" y="56" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="14" font-weight="bold">&lt;/&gt;</text>
  <!-- Rocket accent (small, top-right) -->
  <g transform="translate(72,22) rotate(45)">
    <polygon points="0,-10 3,-2 0,2 -3,-2" fill="#FFD54F"/>
    <polygon points="-2,2 0,6 2,2" fill="#FF7043"/>
  </g>
</svg>
